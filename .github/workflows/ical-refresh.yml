name: Refresh live bookings (iCal)

# Self-running, no channel manager, no account. Pulls live availability from the Airbnb
# iCal export links in automation/ical_sources.json and commits data/live-bookings.json.
# Add your public iCal links (Listing -> Availability -> Export calendar) and it just runs.
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub's minimum; best-effort. For true 3-min, use n8n)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live bookings from iCal
        run: python3 automation/ical_fetch.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/live-bookings.json)" ]; then
            git config user.name "residio-bot"
            git config user.email "bot@residio.local"
            git add data/live-bookings.json
            git commit -m "chore: refresh live bookings (iCal)"
            git push
          else
            echo "No change in live bookings."
          fi
